<app-header></app-header>
<div class="contact-container">
  <form #contactForm="ngForm" (ngSubmit)="onSubmit(contactForm)" novalidate>
    <h5>Contact Us</h5>

    <!-- Name -->
    <div class="form-group">
      <label for="name">Full Name</label>
      <input
        type="text"
        id="name"
        name="name"
        class="form-control"
        ngModel
        required
        minlength="3"
        #name="ngModel"
      />
      <div class="error" *ngIf="name.invalid && name.touched">
        Name is required and must be at least 3 characters.
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        class="form-control"
        ngModel
        required
        #email="ngModel"
      />
      <div class="error" *ngIf="email.invalid && email.touched">
        Please enter a valid email address.
      </div>
    </div>

    <!-- Message -->
    <div class="form-group">
      <label for="message">Message</label>
      <textarea
        id="message"
        name="message"
        rows="4"
        class="form-control"
        ngModel
        required
        #message="ngModel"
      ></textarea>
      <div class="error" *ngIf="message.invalid && message.touched">
        Message cannot be empty.
      </div>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="contactForm.invalid">
      Submit
    </button>
  </form>
</div>
<app-footer class="fixed-bottom"></app-footer>
